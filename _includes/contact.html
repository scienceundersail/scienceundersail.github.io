<section id="contact">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2 text-center">
        <h2 class="section-heading">Let’s get in touch</h2>
        <hr class="primary">
        <p>
          Do you need our help with <strong>data collection</strong>, <strong>field logistics</strong>, <strong>science writing</strong>? Send us an email and we'll get back to you as soon as possible.
        </p>
      </div>

    <div class="row contact-links">
      <!-- Email (Font Awesome) -->
      <div class="col-sm-3 text-center">
        <a href="mailto:{{ site.email }}">
          <i class="fa fa-envelope-o fa-3x wow bounceIn" data-wow-delay=".1s" aria-hidden="true"></i>
          <p>{{ site.email }}</p>
        </a>
      </div>  
    </div>
  </div>
</section>
