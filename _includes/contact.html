<section id="contact">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2 text-center">
        <h2 class="section-heading">Interested in collaborating, supporting our research, or request our services?</h2>
        <hr class="primary">
        <p>Send us an email and we’ll get back to you as soon as possible.</p>
      </div>
    </div>

    <div class="row">
      <div class="col-xs-12 text-center">
        <a href="mailto:{{ site.email }}">
          <i class="fa fa-envelope-o fa-3x wow bounceIn" data-wow-delay=".1s" aria-hidden="true"></i>
          <p>{{ site.email }}</p>
        </a>
      </div>
    </div>
  </div>
</section>
